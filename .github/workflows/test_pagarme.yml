name: Test l10n_br_payment_pagarme

on:
  pull_request:
    paths:
      - 'l10n_br_payment_pagarme/**'
  push:
    paths:
      - 'l10n_br_payment_pagarme/**'

jobs:
  test_pagarme:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/oca/oca-ci/py3.10-odoo16.0:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    services:
      postgres:
        image: postgres:12.0
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    env:
      ADDONS_TO_TEST: "l10n_br_payment_pagarme"
      ADDONS_TO_INSTALL: "account"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize test database for specific modules only
        run: |
          # Create targeted addon installation to avoid all l10n_br modules
          mkdir -p /opt/odoo-test-addons
          
          # Only include our specific module
          cp -r l10n_br_payment_pagarme /opt/odoo-test-addons/
          
          # Set environment to use limited addon path for all subsequent steps
          echo "ADDONS_PATH=/opt/odoo-venv/lib/python3.10/site-packages/odoo/addons,/opt/odoo-test-addons" >> $GITHUB_ENV
          
          # Initialize database with limited scope
          export ADDONS_PATH="/opt/odoo-venv/lib/python3.10/site-packages/odoo/addons,/opt/odoo-test-addons"
          oca_init_test_database

      - name: Run tests for l10n_br_payment_pagarme
        run: |
          # Ensure ADDONS_PATH is set for test run
          export ADDONS_PATH="/opt/odoo-venv/lib/python3.10/site-packages/odoo/addons,/opt/odoo-test-addons"
          oca_run_tests --test-tags l10n_br_payment_pagarme

      - name: Run linting checks
        run: |
          ruff check l10n_br_payment_pagarme/
          ruff format --check l10n_br_payment_pagarme/

      - name: Validate XML files
        run: |
          python3 -c "import xml.etree.ElementTree as ET; [ET.parse(f) for f in ['l10n_br_payment_pagarme/data/pagarme_provider.xml', 'l10n_br_payment_pagarme/views/payment_provider_views.xml', 'l10n_br_payment_pagarme/views/payment_templates.xml']]"

      - name: Check Python syntax
        run: |
          python3 -m py_compile $(find l10n_br_payment_pagarme/ -name "*.py")
