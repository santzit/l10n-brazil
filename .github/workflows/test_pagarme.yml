name: Test l10n_br_payment_pagarme

on:
  pull_request:
    branches:
      - "copilot/fix-*"
  push:
    branches:
      - "copilot/fix-*"

jobs:
  test_pagarme:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/oca/oca-ci/py3.10-odoo16.0:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    services:
      postgres:
        image: postgres:12.0
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    env:
      ADDONS_TO_TEST: "l10n_br_payment_pagarme"
      ADDONS_TO_INSTALL: "account,l10n_br_payment_pagarme"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize test database for specific modules only
        run: |
          # Set limited ADDONS environment to only install required modules
          export ADDONS="account,l10n_br_payment_pagarme"
          oca_init_test_database

      - name: Run tests for l10n_br_payment_pagarme
        run: |
          # Run tests only for the specific module
          oca_run_tests



      - name: Validate XML files
        run: |
          python3 -c "import xml.etree.ElementTree as ET; [ET.parse(f) for f in ['l10n_br_payment_pagarme/data/pagarme_provider.xml', 'l10n_br_payment_pagarme/views/payment_provider_views.xml', 'l10n_br_payment_pagarme/views/payment_templates.xml']]"

      - name: Check Python syntax
        run: |
          python3 -m py_compile $(find l10n_br_payment_pagarme/ -name "*.py")
