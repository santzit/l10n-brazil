name: Test l10n_br_payment_pagarme

on:
  pull_request:
    branches:
      - "copilot/fix-*"
  push:
    branches:
      - "copilot/fix-*"

jobs:
  test_pagarme:
    runs-on: ubuntu-22.04
    container: ghcr.io/oca/oca-ci/py3.10-odoo16.0:latest
    name: Test Pagar.me Payment Module
    
    services:
      postgres:
        image: postgres:12.0
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate syntax and XML files first
        run: |
          echo "=== Validating Python syntax ==="
          python3 -m py_compile $(find l10n_br_payment_pagarme/ -name "*.py")
          echo "✓ All Python files have valid syntax"
          
          echo "=== Validating XML files ==="
          python3 -c "
          import xml.etree.ElementTree as ET
          files = ['l10n_br_payment_pagarme/data/pagarme_provider.xml', 'l10n_br_payment_pagarme/views/payment_provider_views.xml', 'l10n_br_payment_pagarme/views/payment_templates.xml']
          for f in files:
              try:
                  ET.parse(f)
                  print(f'✓ {f} is valid XML')
              except Exception as e:
                  print(f'✗ {f} has XML error: {e}')
                  raise
          "
          echo "✓ All XML files are valid"

      - name: Check module structure
        run: |
          echo "=== Module structure ==="
          echo "Main module files:"
          ls -la l10n_br_payment_pagarme/
          echo ""
          echo "Test files:"
          find l10n_br_payment_pagarme/tests/ -name "*.py" -exec echo "  {}" \;
          echo ""
          echo "Manifest content (dependencies):"
          grep -A 5 '"depends"' l10n_br_payment_pagarme/__manifest__.py

      - name: Setup OCA environment and run tests
        run: |
          echo "=== Setting up OCA environment for Pagar.me testing ==="
          
          echo "=== Install dependencies ==="
          oca_install_addons || {
            echo "❌ oca_install_addons failed, trying alternative approach"
            exit 1
          }
          
          echo "=== Initialize test database ==="  
          oca_init_test_database || {
            echo "❌ oca_init_test_database failed"
            exit 1
          }
          
          echo "=== Run Pagar.me tests ==="
          oca_run_tests || {
            echo "❌ oca_run_tests failed"
            echo "=== Debugging information ==="
            echo "Environment variables:"
            env | grep -E "(INCLUDE|EXCLUDE|ADDONS|ODOO)" || true
            echo "Database status:"
            psql -h postgres -U odoo -d odoo -c "SELECT datname FROM pg_database;" || true
            echo "Installed addons:"
            find /opt/odoo-venv/src -name "__manifest__.py" -path "*/l10n_br_payment_pagarme/*" || true
            exit 1
          }
          
          echo "=== Test execution completed successfully ==="
        env:
          INCLUDE: "l10n_br_payment_pagarme"
          EXCLUDE: ""
          ADDONS_TO_TEST: "l10n_br_payment_pagarme"