name: Test l10n_br_payment_pagarme

on:
  pull_request:
    paths:
      - 'l10n_br_payment_pagarme/**'
  push:
    paths:
      - 'l10n_br_payment_pagarme/**'

jobs:
  test_pagarme:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/oca/oca-ci/py3.10-odoo16.0:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    services:
      postgres:
        image: postgres:12.0
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install addons and dependencies
        run: |
          # Temporarily rename test-constraints.txt to avoid conflicts
          if [ -f test-constraints.txt ]; then
            mv test-constraints.txt test-constraints.txt.backup
          fi
          oca_install_addons account,l10n_br_payment_pagarme
          # Restore test-constraints.txt
          if [ -f test-constraints.txt.backup ]; then
            mv test-constraints.txt.backup test-constraints.txt
          fi

      - name: Initialize test database
        run: oca_init_test_database

      - name: Run tests for l10n_br_payment_pagarme
        run: oca_run_tests --test-tags l10n_br_payment_pagarme

      - name: Run linting checks
        run: |
          ruff check l10n_br_payment_pagarme/
          ruff format --check l10n_br_payment_pagarme/

      - name: Validate XML files
        run: |
          python3 -c "import xml.etree.ElementTree as ET; [ET.parse(f) for f in ['l10n_br_payment_pagarme/data/pagarme_provider.xml', 'l10n_br_payment_pagarme/views/payment_provider_views.xml', 'l10n_br_payment_pagarme/views/payment_templates.xml']]"

      - name: Check Python syntax
        run: |
          python3 -m py_compile $(find l10n_br_payment_pagarme/ -name "*.py")
